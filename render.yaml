# ==========================================================================
# Render Blueprint Specification (render.yaml)
# Deploy NovaForms Frontend & Backend services in a single click.
# ==========================================================================

services:
  # ☕ Backend Service (Java Spring Boot API)
  - type: web
    name: novaforms-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Connection to Neon PostgreSQL
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Google Gemini AI Config
      - key: GEMINI_API_KEY
        sync: false
      # Cloudinary Attachment Config
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Auto-linked from Frontend URL
      - key: FRONTEND_URL
        fromService:
          name: novaforms-frontend
          type: web
          property: url
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: novaforms-frontend
          type: web
          property: url

  # 🖥️ Frontend Service (Next.js App)
  - type: web
    name: novaforms-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      # Auto-linked from Backend API URL
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: novaforms-backend
          type: web
          property: url
      # Optional Clerk Auth Keys
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

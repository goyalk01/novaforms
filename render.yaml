# ==========================================================================
# Render Blueprint Specification (render.yaml)
# Deploy NovaForms Frontend & Backend services in a single click.
# Docs: https://docs.render.com/blueprint-spec
# ==========================================================================

services:
  # ☕ Backend Service (Java Spring Boot API)
  - type: web
    name: novaforms-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Render assigns a dynamic port — Spring Boot must bind to it
      - key: PORT
        value: 8080
      # Connection to Neon PostgreSQL
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Google Gemini AI Config (optional)
      - key: GEMINI_API_KEY
        sync: false
      # Cloudinary Attachment Config (optional)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Auto-linked from Frontend URL
      - key: FRONTEND_URL
        fromService:
          name: novaforms-frontend
          type: web
          property: url
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: novaforms-frontend
          type: web
          property: url

  # 🖥️ Frontend Service (Next.js App)
  - type: web
    name: novaforms-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "3000"
      # Auto-linked from Backend API URL
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: novaforms-backend
          type: web
          property: url
      # Optional Clerk Auth Keys
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
